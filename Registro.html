<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Registro de artículos · Sistema corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #EFF2F7;
            font-family: 'Inter', sans-serif;
            color: #1E2B3C;
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-container {
            max-width: 1100px;
            width: 100%;
            background-color: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(11, 47, 92, 0.08);
            padding: 32px 30px;
            margin: 10px auto;
            border: 1px solid rgba(201, 167, 77, 0.15);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            border-bottom: 2px solid #E9ECF0;
            padding-bottom: 18px;
        }

        .title-container {
            flex: 1 1 auto;
            text-align: left;
        }

        .page-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #0B2F5C;
            letter-spacing: -0.5px;
            margin: 0;
            line-height: 1.2;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px 28px;
            margin-top: 10px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #2C3E58;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label i {
            color: #C9A74D;
            width: 18px;
            font-size: 0.95rem;
        }

        .required-star {
            color: #C44536;
            margin-left: 4px;
        }

        input, select {
            background: #F9FBFD;
            border: 1.5px solid #E2E7ED;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            color: #1A2C3F;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: #3A6D8C;
            outline: none;
            box-shadow: 0 0 0 4px rgba(58, 109, 140, 0.08);
            background: white;
        }

        .camera-buttons-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: stretch;
        }

        .camera-btn {
            background: white;
            border: 1.5px solid #DDE3EA;
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0B2F5C;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 0 auto;
            justify-content: center;
            background: #F2F6FA;
        }

        .camera-btn i {
            color: #3A6D8C;
            font-size: 1.1rem;
        }

        .preview-area {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            background: #F2F6FA;
            border-radius: 16px;
            padding: 12px 16px;
        }

        .preview-image {
            max-width: 70px;
            max-height: 70px;
            border-radius: 12px;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            object-fit: cover;
        }

        .barcode-preview {
            font-family: monospace;
            background: white;
            padding: 6px 14px;
            border-radius: 30px;
            color: #1E3B4F;
            font-size: 0.9rem;
            border: 1px solid #C9A74D;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 150px;
        }

        .btn-submit {
            background: #0B2F5C;
            border: none;
            border-radius: 40px;
            padding: 18px 48px;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 10px 18px -6px #0B2F5C;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            margin: 40px auto 0;
        }

        .btn-submit i {
            color: #C9A74D;
            font-size: 1.3rem;
        }

        .btn-submit:hover {
            background: #16486C;
            transform: scale(1.02);
            box-shadow: 0 16px 22px -8px #0B2F5C;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .sheet-message {
            margin-top: 25px;
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .sheet-message.success {
            background: #EAF6ED;
            color: #1F6C4A;
            border-left: 6px solid #2A8E5C;
            display: block;
        }

        .sheet-message.error {
            background: #FFEFED;
            color: #A13A2F;
            border-left-color: #C44536;
            display: block;
        }

        .sheet-message.warning {
            background: #FFF8E7;
            color: #B76E00;
            border-left-color: #C9A74D;
            display: block;
        }

            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #E2E8F0;
            padding-top: 20px;
            font-weight: 500;
        }

        .credits i {
            color: #C9A74D;
            margin-right: 5px;
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .scanner-modal.active {
            display: flex;
        }

        .scanner-container {
            width: 95%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

            align-items: center;

        }

            color: #0B2F5C;

        }

            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
            border: 2px solid #C9A74D;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-close {
            background: #C44536;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .scanner-close:hover {
            background: #a5372b;
        }

        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10001;
            justify-content: center;
            align-items: center;
        }

            display: flex;
        }

            width: 90%;

        }

            color: #2C3E58;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }

        .confirm-btn-yes {
            background: #0B2F5C;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
        }

        .confirm-btn-no {
            background: #E2E7ED;
            color: #1E2B3C;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10002;
            justify-content: center;
            align-items: center;
        }

        .result-modal.active {
            display: flex;
        }

            background: white;
            border-radius: 28px;
            padding: 32px;

            width: 90%;
            text-align: center;
        }

        .result-modal-content h3 {
            color: #1F6C4A;
            margin-bottom: 20px;
        }

            font-size: 2.5rem;

            background: #F2F6FA;

            background: #0B2F5C;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            margin-top: 20px;

        .hidden-field {
            display: none;

</head>
<body>
    <div class="page-container">

        </div>

                        <button type="button" id="scanBarcodeBtn" class="camera-btn">
                            <i class="fas fa-camera"></i> Escanear

            // Mostrar/ocultar PZ X CAJA
            function togglePzXCaja() {
                if (unidadVentaSelect.value === 'CAJA') {

            // Beep
            function reproducirBeep() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.frequency.value = 800;
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    setTimeout(() => {
                        oscillator.stop();
                        audioCtx.close();
                    }, 150);
                } catch (e) {}
            }

            function getCDMXTimestamp() {

            // FUNCIÓN PARA REDUCIR TAMAÑO DE IMAGEN (SOLUCIÓN DEL ERROR)
            function resizeImage(base64, maxWidth = 800, quality = 0.7) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const resizedBase64 = canvas.toDataURL('image/jpeg', quality);
                        resolve(resizedBase64);
                    };
                    img.onerror = reject;
                    img.src = base64;
                });
            }

            // Obtener siguiente ID

// Obtener siguiente ID con formato 2 dígitos (IN01, IN02... IN99, luego IN100)
async function getNextId(almacen) {
    const prefix = almacen === 'INVENTARIOS' ? 'IN' : 'LI';
    const snapshot = await db.collection('articulos').get();
    let maxNum = 0;
    
    snapshot.forEach(doc => {
        const id = doc.id;
        if (id.startsWith(prefix)) {
            // Extraer solo los números del ID
            const numStr = id.replace(prefix, '');
            const num = parseInt(numStr, 10);
            if (!isNaN(num) && num > maxNum) {
                maxNum = num;
            }
        }
    });
    
    const nextNum = maxNum + 1;
    
    // Formato: si es menor a 10, agregar cero a la izquierda (IN01, IN02...)
    // Si es mayor o igual a 10, mostrar sin cero (IN10, IN11...)
    if (nextNum < 10) {
        return prefix + '0' + nextNum;
    } else {
        return prefix + nextNum;
    }
}

            // Buscar por SKU
            async function findArticuloBySku(sku) {
                try {
                    const snapshot = await db.collection('articulos')
                        .where('sku', '==', sku)
                        .limit(1)
                        .get();
                    
                    if (!snapshot.empty) {
                        let docData = null;
                        let docId = null;
                        snapshot.forEach(d => {
                            docData = d.data();
                            docId = d.id;
                        });
                        return { exists: true, data: docData, id: docId };
                    }
                    return { exists: false };
                } catch (error) {
                    console.error('Error al buscar:', error);
                    return { exists: false };
                }
            }

            // Buscar por SKU + Unidad
            async function findArticuloBySkuAndUnidad(sku, unidadVenta) {
                try {
                    const snapshot = await db.collection('articulos')
                        .where('sku', '==', sku)
                        .where('unidad_venta', '==', unidadVenta)
                        .limit(1)
                        .get();
                    
                    if (!snapshot.empty) {
                        let docData = null;
                        let docId = null;
                        snapshot.forEach(d => {
                            docData = d.data();
                            docId = d.id;
                        });
                        return { exists: true, data: docData, id: docId };
                    }
                    return { exists: false };
                } catch (error) {
                    console.error('Error al buscar:', error);
                    return { exists: false };
                }
            }

            function autoFillForm(data) {
                if (data.descripcion) descripcionInput.value = data.descripcion;
                if (data.unidad_venta) {
                    unidadVentaSelect.value = data.unidad_venta;
                    togglePzXCaja();
                }
                if (data.pz_x_caja) pzXCajaInput.value = data.pz_x_caja;
                if (data.codigo_barras) {
                    barcodeHidden.value = data.codigo_barras;
                    barcodeDisplay.innerHTML = `<i class="fas fa-check-circle" style="color:#C9A74D;"></i> ${data.codigo_barras}`;
                }
                if (data.fotografia) {
                    photoBase64Input.value = data.fotografia;
                    photoPreview.src = data.fotografia;
                    photoPreviewContainer.style.display = 'flex';
                }
                if (data.almacen) almacenSelect.value = data.almacen;
                
                showMessage('✅ Datos cargados automáticamente', 'success');
            }

            // Evento SKU
            let skuTimeout;
            skuInput.addEventListener('input', function() {
                clearTimeout(skuTimeout);
                skuTimeout = setTimeout(async () => {
                    const sku = skuInput.value.trim();
                    if (!sku) return;
                    
                    const result = await findArticuloBySku(sku);
                    
                    if (result.exists) {
                        confirmMessage.innerHTML = `Este SKU ya existe con unidad de venta: <strong>${result.data.unidad_venta}</strong>`;
                        pendingSkuData = result.data;
                        confirmModal.classList.add('active');
                        
                        confirmCallback = (cargar) => {
                            if (cargar) autoFillForm(result.data);
                            confirmModal.classList.remove('active');
                            pendingSkuData = null;
                        };
                    }
                }, 500);
            });

            confirmYesBtn.addEventListener('click', () => {
                if (confirmCallback) confirmCallback(true);
            });
            
            confirmNoBtn.addEventListener('click', () => {
                if (confirmCallback) confirmCallback(false);
            });

            // Escáner
            async function iniciarCamara() {
                try {
                    detenerCamara();
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    video.srcObject = stream;
                    await video.play();
                    scannerModal.classList.add('active');
                    scanInterval = setInterval(escanearCodigo, 500);
                } catch (error) {
                    showMessage('❌ No se pudo acceder a la cámara', 'error');
                    scannerModal.classList.remove('active');
                }
            }

            function escanearCodigo() {
                if (!video.videoWidth) return;
                if ('BarcodeDetector' in window) {
                    const detector = new BarcodeDetector();
                    detector.detect(video).then(codes => {
                        if (codes.length > 0) {
                            const barcode = codes[0].rawValue;
                            barcodeHidden.value = barcode;
                            barcodeDisplay.innerHTML = `<i class="fas fa-check-circle" style="color:#C9A74D;"></i> ${barcode}`;
                            reproducirBeep();
                            detenerCamara();
                            scannerModal.classList.remove('active');
                            showMessage('✅ Código escaneado: ' + barcode, 'success');
                        }
                    }).catch(err => console.log('Error:', err));
                }
            }

            function detenerCamara() {
                if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
                if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
                video.srcObject = null;
            }

            document.getElementById('scanBarcodeBtn').addEventListener('click', () => iniciarCamara());
            closeScannerBtn.addEventListener('click', () => {
                detenerCamara();
                scannerModal.classList.remove('active');
            });

            document.getElementById('useSkuBtn').addEventListener('click', () => {
                const sku = skuInput.value.trim();
                if (sku) {
                    barcodeHidden.value = sku;
                    barcodeDisplay.innerHTML = `<i class="fas fa-copy" style="color:#C9A74D;"></i> ${sku} (SKU)`;
                    showMessage('✅ Código asignado desde SKU', 'success');
                } else {
                    showMessage('❌ Ingresa un SKU primero', 'error');
                }
            });

            // Foto con compresión
            document.getElementById('takePhotoBtn').addEventListener('click', () => photoInput.click());
            
            photoInput.addEventListener('change', async function(event) {
                if (event.target.files && event.target.files[0]) {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    
                    reader.onload = async function(e) {
                        showMessage('📷 Procesando imagen...', 'success');
                        try {
                            // Reducir la imagen a 800px de ancho y 70% calidad
                            const resizedImage = await resizeImage(e.target.result, 800, 0.7);
                            photoPreview.src = resizedImage;
                            photoBase64Input.value = resizedImage;
                            photoPreviewContainer.style.display = 'flex';
                            showMessage('✅ Foto lista (tamaño optimizado)', 'success');
                        } catch (error) {
                            console.error('Error al procesar imagen:', error);
                            showMessage('❌ Error al procesar la foto', 'error');
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('clearPhotoBtn').addEventListener('click', () => {
                photoInput.value = '';
                photoBase64Input.value = '';
                photoPreviewContainer.style.display = 'none';
                photoPreview.src = '#';
            });

            // Envío
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const sku = skuInput.value.trim();
                const descripcion = descripcionInput.value.trim();
                const cantidad = cantidadInput.value.trim();
                const almacen = almacenSelect.value;
                const unidadVenta = unidadVentaSelect.value;
                const pzXCaja = unidadVenta === 'CAJA' ? pzXCajaInput.value : null;

                if (!sku || !descripcion || !cantidad || !almacen) {
                    showMessage('Completa todos los campos obligatorios', 'error');
                    return;
                }

                if (unidadVenta === 'CAJA' && (!pzXCaja || pzXCaja <= 0)) {
                    showMessage('Ingresa las piezas por caja', 'error');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Guardando...';

                try {
                    const existing = await findArticuloBySkuAndUnidad(sku, unidadVenta);
                    let idUnico;

                    if (existing.exists) {
                        idUnico = existing.id;
                    } else {
                        idUnico = await getNextId(almacen);
                    }

                    // Si hay foto pero es muy grande, comprimir de nuevo (por seguridad)
                    let fotoFinal = photoBase64Input.value;
                    if (fotoFinal && fotoFinal.length > 500000) { // Si pasa de ~500KB
                        showMessage('📷 Comprimiendo imagen...', 'success');
                        fotoFinal = await resizeImage(fotoFinal, 800, 0.6);
                    }

                    const articuloData = {
                        sku: sku,
                        codigo_barras: barcodeHidden.value || sku,
                        fotografia: fotoFinal || '',
                        descripcion: descripcion,
                        cantidad: parseInt(cantidad),
                        unidad_venta: unidadVenta,
                        pz_x_caja: pzXCaja ? parseInt(pzXCaja) : null,
                        almacen: almacen,
                        timestamp: getCDMXTimestamp(),
                        fuente: 'registro-articulos'
                    };

                    await db.collection('articulos').doc(idUnico).set(articuloData);

                    resultSku.textContent = sku;
                    resultDescripcion.textContent = descripcion;
                    resultId.textContent = idUnico;
                    resultModal.classList.add('active');

                    resetForm();
                    showMessage('✅ Artículo guardado correctamente', 'success');
                    
                } catch (error) {
                    console.error('Error:', error);
                    showMessage('Error al guardar: ' + error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save"></i> Guardar';
                }
            });

            closeResultBtn.addEventListener('click', () => {
                resultModal.classList.remove('active');
            });

            togglePzXCaja();

            if (location.protocol !== 'https:' && !location.hostname.includes('localhost')) {
                showMessage('⚠️ Esta página requiere HTTPS para usar la cámara', 'error');
            }
        })();
    </script>
</body>
</html>
