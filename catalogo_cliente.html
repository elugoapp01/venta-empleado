<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Catálogo de Artículos · Sistema Corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #EFF2F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-top: 130px;
        }

        /* ========== HEADER FIJO ========== */
        .header-fijo {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 1000;
            padding: 15px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border-bottom: 2px solid #E9ECF0;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            border-radius: 0 0 28px 28px;
        }

        .header-fijo-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header-fijo .left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-fijo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0B2F5C;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            white-space: nowrap;
        }

        .header-fijo h1 i {
            color: #C9A74D;
        }

        .header-fijo .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header-fijo .stat-item {
            background: #F2F6FA;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #0B2F5C;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .header-fijo .stat-item i {
            color: #C9A74D;
        }

        /* ========== BUSCADOR ========== */
        .buscador-container {
            flex: 1;
            min-width: 200px;
            max-width: 450px;
            position: relative;
        }

        .buscador-container input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid #E2E7ED;
            border-radius: 30px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s ease;
            background: #F9FBFD;
            font-family: 'Inter', sans-serif;
        }

        .buscador-container input:focus {
            border-color: #C9A74D;
            background: white;
            box-shadow: 0 0 0 4px rgba(201, 167, 77, 0.1);
        }

        .buscador-container .icono-busqueda {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6C8196;
            font-size: 0.9rem;
        }

        .buscador-container .limpiar-busqueda {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6C8196;
            cursor: pointer;
            font-size: 0.8rem;
            display: none;
            padding: 4px;
        }

        .buscador-container .limpiar-busqueda.visible {
            display: block;
        }

        .buscador-container .limpiar-busqueda:hover {
            color: #C44536;
        }

        /* Contador de resultados */
        .resultados-contador {
            font-size: 0.7rem;
            color: #6C8196;
            margin-top: 4px;
            text-align: center;
            display: none;
        }

        .resultados-contador.visible {
            display: block;
        }

        /* ========== CONTROLES DE PAGINACIÓN ========== */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-controls .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #0B2F5C;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-controls .nav-btn:hover:not(:disabled) {
            background: #16486C;
            transform: scale(1.08);
        }

        .header-controls .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .header-controls .nav-btn i {
            color: #C9A74D;
        }

        .header-controls .page-indicator {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.8rem;
            background: #F2F6FA;
            padding: 4px 14px;
            border-radius: 30px;
            min-width: 70px;
            text-align: center;
        }

        /* ========== CONTENEDOR PRINCIPAL ========== */
        .catalog-container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(11, 47, 92, 0.08);
            padding: 30px;
            border: 1px solid rgba(201, 167, 77, 0.15);
            margin-top: 0;
        }

        /* ========== ESTILO DEL LIBRO ========== */
        .book-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            perspective: 1500px;
            padding: 10px 0;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .book-page {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            padding: 25px;
            display: none;
            transform-origin: left center;
            transition: all 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border: 1px solid #E9ECF0;
        }

        .book-page.active {
            display: block;
            animation: pageFlipIn 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .book-page.flipping {
            animation: pageFlipOut 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        @keyframes pageFlipIn {
            0% {
                transform: rotateY(-90deg) scale(0.95);
                opacity: 0;
            }
            100% {
                transform: rotateY(0deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes pageFlipOut {
            0% {
                transform: rotateY(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: rotateY(90deg) scale(0.95);
                opacity: 0;
            }
        }

        /* ========== GRID DE ARTÍCULOS ========== */
        .articulos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .articulo-card {
            background: #F9FBFD;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #E2E7ED;
            cursor: pointer;
        }

        .articulo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(11, 47, 92, 0.1);
            border-color: #C9A74D;
        }

        .articulo-card .foto-container {
            width: 100%;
            height: 180px;
            background: #F2F6FA;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .articulo-card .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .articulo-card:hover .foto-container img {
            transform: scale(1.05);
        }

        .articulo-card .foto-container .no-image {
            font-size: 2.5rem;
            color: #6C8196;
            opacity: 0.5;
        }

        .articulo-card .info {
            padding: 12px 14px;
        }

        .articulo-card .info .id-badge {
            display: inline-block;
            background: #C9A74D;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .articulo-card .info .sku {
            font-size: 0.7rem;
            color: #6C8196;
            font-weight: 500;
        }

        .articulo-card .info .descripcion {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.85rem;
            margin: 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 38px;
        }

        .articulo-card .info .desc-sistema {
            font-size: 0.65rem;
            color: #6C8196;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ZONA */
        .articulo-card .info .zona-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .zona-a {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .zona-b {
            background: #FEF3C7;
            color: #92400E;
        }

        /* PRECIO - Resaltado */
        .articulo-card .info .precio-container {
            background: #FFFBEB;
            border-radius: 10px;
            padding: 8px 12px;
            margin: 6px 0;
            border: 2px solid #C9A74D;
        }

        .articulo-card .info .precio-valor {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0B2F5C;
            text-align: center;
        }

        .articulo-card .info .precio-valor .simbolo {
            color: #C9A74D;
        }

        .articulo-card .info .detalles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
            font-size: 0.6rem;
            color: #4A627A;
        }

        .articulo-card .info .detalles span {
            background: white;
            padding: 2px 8px;
            border-radius: 16px;
            border: 1px solid #E2E7ED;
        }

        /* ========== CONTROLES FOOTER ========== */
        .book-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #E9ECF0;
        }

        .book-controls button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #0B2F5C;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-controls button:hover:not(:disabled) {
            background: #16486C;
            transform: scale(1.08);
        }

        .book-controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .book-controls button i {
            color: #C9A74D;
        }

        .book-controls .page-indicator-footer {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.9rem;
            background: #F2F6FA;
            padding: 8px 20px;
            border-radius: 30px;
            min-width: 100px;
            text-align: center;
        }

        /* ========== MODAL DETALLE ========== */
        .modal-detalle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-detalle.active {
            display: flex;
        }

        .modal-detalle-content {
            background: white;
            border-radius: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            padding: 30px;
            animation: modalFadeIn 0.4s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-detalle-content .modal-foto {
            width: 100%;
            max-height: 500px;
            border-radius: 16px;
            overflow: hidden;
            background: #F2F6FA;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .modal-detalle-content .modal-foto img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        .modal-detalle-content .modal-foto .no-image {
            font-size: 4rem;
            color: #6C8196;
            opacity: 0.5;
            padding: 60px;
        }

        .modal-detalle-content .modal-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-detalle-content .modal-info .campo {
            background: #F9FBFD;
            padding: 10px 14px;
            border-radius: 12px;
        }

        .modal-detalle-content .modal-info .campo .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #6C8196;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .modal-detalle-content .modal-info .campo .value {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.9rem;
            margin-top: 2px;
        }

        .modal-detalle-content .modal-info .campo .value.precio {
            color: #C9A74D;
            font-size: 1.4rem;
            font-weight: 800;
        }

        .modal-detalle-content .modal-close {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #0B2F5C;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .modal-detalle-content .modal-close:hover {
            background: #16486C;
        }

        /* ========== LOADING Y SIN RESULTADOS ========== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6C8196;
        }

        .loading i {
            font-size: 3rem;
            color: #C9A74D;
            margin-bottom: 15px;
        }

        .loading .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6C8196;
        }

        .no-results i {
            font-size: 4rem;
            color: #C9A74D;
            opacity: 0.5;
            margin-bottom: 15px;
        }

        .no-results h3 {
            color: #0B2F5C;
            margin-bottom: 8px;
        }

        /* ========== SCROLLBAR ========== */
        .modal-detalle-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-detalle-content::-webkit-scrollbar-track {
            background: #F2F6FA;
            border-radius: 10px;
        }
        .modal-detalle-content::-webkit-scrollbar-thumb {
            background: #C9A74D;
            border-radius: 10px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 992px) {
            .articulos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header-fijo {
                padding: 12px 20px;
            }
            body {
                padding-top: 120px;
            }
        }

        @media (max-width: 768px) {
            .header-fijo {
                padding: 10px 15px;
            }
            .header-fijo h1 {
                font-size: 1.1rem;
            }
            .header-fijo .left {
                gap: 10px;
            }
            .header-fijo .stats {
                gap: 8px;
            }
            .header-fijo .stat-item {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
            .buscador-container {
                min-width: 140px;
                flex: 1;
            }
            .buscador-container input {
                padding: 8px 12px 8px 34px;
                font-size: 0.75rem;
            }
            .buscador-container .icono-busqueda {
                left: 10px;
                font-size: 0.75rem;
            }
            .header-controls .nav-btn {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }
            .header-controls .page-indicator {
                font-size: 0.7rem;
                padding: 3px 10px;
                min-width: 55px;
            }
            .catalog-container { padding: 20px; }
            .articulos-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px;
            }
            .articulo-card .foto-container { height: 150px; }
            .modal-detalle-content .modal-info { grid-template-columns: 1fr; }
            .modal-detalle-content .modal-foto { max-height: 300px; }
            .modal-detalle-content .modal-foto img { max-height: 300px; }
            body {
                padding-top: 110px;
            }
        }

        @media (max-width: 480px) {
            .header-fijo {
                padding: 8px 10px;
            }
            .header-fijo h1 {
                font-size: 0.9rem;
            }
            .header-fijo h1 i {
                font-size: 0.9rem;
            }
            .header-fijo .left {
                gap: 6px;
            }
            .header-fijo .stats {
                gap: 4px;
            }
            .header-fijo .stat-item {
                font-size: 0.55rem;
                padding: 3px 8px;
            }
            .buscador-container {
                min-width: 100px;
            }
            .buscador-container input {
                padding: 6px 10px 6px 28px;
                font-size: 0.65rem;
            }
            .buscador-container .icono-busqueda {
                left: 8px;
                font-size: 0.65rem;
            }
            .header-controls .nav-btn {
                width: 26px;
                height: 26px;
                font-size: 0.65rem;
            }
            .header-controls .page-indicator {
                font-size: 0.6rem;
                padding: 2px 8px;
                min-width: 45px;
            }
            .articulos-grid { 
                grid-template-columns: 1fr 1fr; 
                gap: 10px;
            }
            .articulo-card .info { padding: 10px; }
            .articulo-card .info .descripcion { font-size: 0.7rem; min-height: 30px; }
            .articulo-card .info .precio-valor { font-size: 1.1rem; }
            .articulo-card .foto-container { height: 120px; }
            .modal-detalle-content .modal-foto { max-height: 250px; }
            .modal-detalle-content .modal-foto img { max-height: 250px; }
            .catalog-container { padding: 15px; }
            .book-page { padding: 15px; }
            body {
                padding-top: 95px;
                padding-left: 10px;
                padding-right: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== HEADER FIJO ========== -->
    <div class="header-fijo" id="headerFijo">
        <div class="header-fijo-inner">
            <div class="left">
                <h1>
                    <i class="fas fa-book-open"></i> Catálogo
                </h1>
                <div class="stats">
                    <div class="stat-item">
                        <i class="fas fa-boxes"></i>
                        <span id="totalArticulos">0</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-warehouse"></i>
                        <span id="totalAlmacenes">0</span>
                    </div>
                </div>
            </div>

            <!-- BUSCADOR -->
            <div class="buscador-container">
                <i class="fas fa-search icono-busqueda"></i>
                <input type="text" id="buscador" placeholder="Buscar por SKU, código, descripción..." autocomplete="off">
                <button class="limpiar-busqueda" id="limpiarBusqueda" title="Limpiar búsqueda">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>

            <!-- CONTROLES DE PAGINACIÓN -->
            <div class="header-controls">
                <button class="nav-btn" id="prevPageHeader" title="Página anterior">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="page-indicator" id="pageIndicatorHeader">1 / 1</span>
                <button class="nav-btn" id="nextPageHeader" title="Página siguiente">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        <!-- Contador de resultados -->
        <div class="resultados-contador" id="resultadosContador"></div>
    </div>

    <!-- ========== CONTENIDO PRINCIPAL ========== -->
    <div class="catalog-container">
        <div id="bookContainer" class="book-container">
            <div class="loading" id="loading">
                <i class="fas fa-book-open spinner"></i>
                <p>Cargando catálogo...</p>
            </div>
            <div id="bookPages" class="book"></div>
        </div>

        <div class="book-controls">
            <button id="prevPage" title="Página anterior">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="page-indicator-footer" id="pageIndicatorFooter">Página 1 / 1</span>
            <button id="nextPage" title="Página siguiente">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- MODAL DE DETALLE -->
    <div id="modalDetalle" class="modal-detalle">
        <div class="modal-detalle-content">
            <div class="modal-foto" id="modalFoto">
                <div class="no-image"><i class="fas fa-image"></i></div>
            </div>
            <div class="modal-info" id="modalInfo"></div>
            <button class="modal-close" onclick="cerrarModal()">
                <i class="fas fa-times"></i> Cerrar
            </button>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN DE FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyA0wUh8AqTOT36ofTMVHdKSRqWZ1MMhHzY",
            authDomain: "venta-empleado.firebaseapp.com",
            projectId: "venta-empleado",
            storageBucket: "venta-empleado.firebasestorage.app",
            messagingSenderId: "655370302032",
            appId: "1:655370302032:web:bc276acc7683a67b49d755"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // ==============================================

        let articulosCompletos = [];
        let articulosFiltrados = [];
        let preciosMap = {};
        let paginaActual = 0;
        const ARTICULOS_POR_PAGINA = 6;
        let terminoBusqueda = '';

        // ========== CARGAR DATOS ==========
        async function cargarCatalogo() {
            try {
                const loading = document.getElementById('loading');
                loading.style.display = 'block';

                const preciosSnap = await db.collection('precios').get();
                preciosMap = {};
                preciosSnap.forEach(doc => {
                    const data = doc.data();
                    preciosMap[doc.id] = {
                        precio: data.p_unitario || 0,
                        descripcion_sistema: data.descripcion_sistema || ''
                    };
                });

                const articulosSnap = await db.collection('articulos').get();
                articulosCompletos = [];
                articulosSnap.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const cantidad = data.cantidad || 0;
                    
                    // SOLO agregar si tiene stock > 0
                    if (cantidad > 0) {
                        const precioData = preciosMap[id] || {};
                        articulosCompletos.push({
                            id: id,
                            sku: data.sku || '',
                            descripcion: data.descripcion || '',
                            codigo_barras: data.codigo_barras || '',
                            fotografia: data.fotografia || '',
                            cantidad: cantidad,
                            unidad_venta: data.unidad_venta || 'PIEZA',
                            almacen: data.almacen || '',
                            pz_x_caja: data.pz_x_caja || null,
                            precio: precioData.precio || 0,
                            descripcion_sistema: precioData.descripcion_sistema || '',
                            timestamp: data.timestamp || ''
                        });
                    }
                });

                articulosCompletos.sort((a, b) => a.id.localeCompare(b.id));
                articulosFiltrados = [...articulosCompletos];

                actualizarStats();
                loading.style.display = 'none';
                renderizarPagina(0);

            } catch (error) {
                console.error('Error al cargar:', error);
                document.getElementById('loading').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color:#C44536;"></i>
                    <p>Error al cargar el catálogo: ${error.message}</p>
                `;
            }
        }

        // ========== ACTUALIZAR ESTADÍSTICAS ==========
        function actualizarStats() {
            document.getElementById('totalArticulos').textContent = articulosCompletos.length;
            const almacenes = new Set(articulosCompletos.map(a => a.almacen).filter(a => a));
            document.getElementById('totalAlmacenes').textContent = almacenes.size;
        }

        // ========== BUSCADOR ==========
        const buscadorInput = document.getElementById('buscador');
        const limpiarBtn = document.getElementById('limpiarBusqueda');
        const contadorDiv = document.getElementById('resultadosContador');

        function buscarArticulos() {
            const termino = buscadorInput.value.toLowerCase().trim();
            terminoBusqueda = termino;

            if (termino.length > 0) {
                limpiarBtn.classList.add('visible');
            } else {
                limpiarBtn.classList.remove('visible');
            }

            // Filtrar artículos
            if (!termino) {
                articulosFiltrados = [...articulosCompletos];
                contadorDiv.classList.remove('visible');
            } else {
                articulosFiltrados = articulosCompletos.filter(art => {
                    const id = art.id.toLowerCase();
                    const sku = art.sku.toLowerCase();
                    const codigo = art.codigo_barras.toLowerCase();
                    const descripcion = art.descripcion.toLowerCase();
                    const descSistema = art.descripcion_sistema.toLowerCase();
                    
                    return id.includes(termino) ||
                           sku.includes(termino) ||
                           codigo.includes(termino) ||
                           descripcion.includes(termino) ||
                           descSistema.includes(termino);
                });

                // Mostrar contador de resultados
                if (articulosFiltrados.length > 0) {
                    contadorDiv.textContent = `${articulosFiltrados.length} resultado${articulosFiltrados.length > 1 ? 's' : ''}`;
                    contadorDiv.classList.add('visible');
                } else {
                    contadorDiv.textContent = '0 resultados';
                    contadorDiv.classList.add('visible');
                }
            }

            paginaActual = 0;
            renderizarPagina(0);
        }

        limpiarBtn.addEventListener('click', function() {
            buscadorInput.value = '';
            this.classList.remove('visible');
            contadorDiv.classList.remove('visible');
            articulosFiltrados = [...articulosCompletos];
            paginaActual = 0;
            renderizarPagina(0);
            buscadorInput.focus();
        });

        // Evento input para búsqueda en tiempo real
        buscadorInput.addEventListener('input', buscarArticulos);

        // ========== RENDERIZAR PÁGINA ==========
        function renderizarPagina(numeroPagina) {
            const container = document.getElementById('bookPages');
            const totalPaginas = Math.ceil(articulosFiltrados.length / ARTICULOS_POR_PAGINA);

            if (totalPaginas === 0) {
                container.innerHTML = `
                    <div class="book-page active">
                        <div class="no-results">
                            <i class="fas fa-search"></i>
                            <h3>No se encontraron artículos</h3>
                            <p style="color:#6C8196;">${terminoBusqueda ? 'No hay coincidencias para "' + terminoBusqueda + '"' : 'No hay artículos con stock disponible'}</p>
                        </div>
                    </div>
                `;
                actualizarControles(totalPaginas);
                return;
            }

            paginaActual = Math.max(0, Math.min(numeroPagina, totalPaginas - 1));

            const inicio = paginaActual * ARTICULOS_POR_PAGINA;
            const fin = Math.min(inicio + ARTICULOS_POR_PAGINA, articulosFiltrados.length);
            const articulosPagina = articulosFiltrados.slice(inicio, fin);

            let html = `<div class="book-page active">`;
            html += `<div class="articulos-grid">`;

            for (const art of articulosPagina) {
                const fotoHtml = art.fotografia ?
                    `<img src="${art.fotografia}" alt="${art.descripcion}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'><i class=\\'fas fa-image\\'></i></div>'">` :
                    `<div class="no-image"><i class="fas fa-image"></i></div>`;

                const zonaClase = art.almacen === 'INVENTARIOS' ? 'zona-a' : art.almacen === 'LOGISTICA INVERSA' ? 'zona-b' : '';
                const zonaTexto = art.almacen === 'INVENTARIOS' ? 'Zona A (INVENTARIOS)' :
                    art.almacen === 'LOGISTICA INVERSA' ? 'Zona B (LOGISTICA INVERSA)' :
                    art.almacen || 'N/A';

                html += `
                    <div class="articulo-card" onclick="abrirDetalle('${art.id}')">
                        <div class="foto-container">${fotoHtml}</div>
                        <div class="info">
                            <div>
                                <span class="id-badge">${art.id}</span>
                                <span class="sku">SKU: ${art.sku || 'N/A'}</span>
                            </div>
                            <div class="descripcion">${art.descripcion || 'Sin descripción'}</div>
                            ${art.descripcion_sistema ? `<div class="desc-sistema">📌 ${art.descripcion_sistema}</div>` : ''}
                            
                            <span class="zona-badge ${zonaClase}">📍 ${zonaTexto}</span>
                            
                            <div class="precio-container">
                                <div class="precio-valor">
                                    <span class="simbolo">$</span>${art.precio.toFixed(2)}
                                </div>
                            </div>
                            
                            <div class="detalles">
                                ${art.pz_x_caja ? `<span><i class="fas fa-boxes"></i> ${art.pz_x_caja} pz/caja</span>` : ''}
                                <span><i class="fas fa-barcode"></i> ${art.codigo_barras || 'N/A'}</span>
                                <span><i class="fas fa-box"></i> ${art.unidad_venta}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            const espaciosVacios = ARTICULOS_POR_PAGINA - articulosPagina.length;
            for (let i = 0; i < espaciosVacios; i++) {
                html += `<div style="visibility:hidden;"></div>`;
            }

            html += `</div></div>`;
            container.innerHTML = html;

            actualizarControles(totalPaginas);
        }

        // ========== ACTUALIZAR CONTROLES ==========
        function actualizarControles(totalPaginas) {
            const disabledPrev = paginaActual === 0;
            const disabledNext = paginaActual >= totalPaginas - 1 || totalPaginas === 0;
            const pageText = totalPaginas === 0 ? '0 / 0' : `${paginaActual + 1} / ${totalPaginas}`;

            document.getElementById('prevPageHeader').disabled = disabledPrev;
            document.getElementById('nextPageHeader').disabled = disabledNext;
            document.getElementById('pageIndicatorHeader').textContent = pageText;

            document.getElementById('prevPage').disabled = disabledPrev;
            document.getElementById('nextPage').disabled = disabledNext;
            document.getElementById('pageIndicatorFooter').textContent = `Página ${pageText}`;
        }

        // ========== CAMBIAR PÁGINA ==========
        function cambiarPagina(direccion) {
            const totalPaginas = Math.ceil(articulosFiltrados.length / ARTICULOS_POR_PAGINA);
            const nuevaPagina = paginaActual + direccion;
            if (nuevaPagina < 0 || nuevaPagina >= totalPaginas) return;

            const currentPage = document.querySelector('.book-page.active');
            if (currentPage) {
                currentPage.classList.remove('active');
                currentPage.classList.add('flipping');
                setTimeout(() => {
                    renderizarPagina(nuevaPagina);
                }, 300);
            } else {
                renderizarPagina(nuevaPagina);
            }
        }

        // ========== ABRIR MODAL DE DETALLE ==========
        function abrirDetalle(id) {
            const art = articulosCompletos.find(a => a.id === id);
            if (!art) return;

            const modal = document.getElementById('modalDetalle');
            const fotoContainer = document.getElementById('modalFoto');
            const infoContainer = document.getElementById('modalInfo');

            if (art.fotografia) {
                fotoContainer.innerHTML = `<img src="${art.fotografia}" alt="${art.descripcion}" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'><i class=\\'fas fa-image\\'></i></div>'">`;
            } else {
                fotoContainer.innerHTML = `<div class="no-image"><i class="fas fa-image"></i></div>`;
            }

            const zona = art.almacen === 'INVENTARIOS' ? 'Zona A (INVENTARIOS)' :
                art.almacen === 'LOGISTICA INVERSA' ? 'Zona B (LOGISTICA INVERSA)' :
                art.almacen || 'No asignado';

            infoContainer.innerHTML = `
                <div class="campo">
                    <div class="label">ID Único</div>
                    <div class="value">${art.id}</div>
                </div>
                <div class="campo">
                    <div class="label">SKU</div>
                    <div class="value">${art.sku || 'N/A'}</div>
                </div>
                <div class="campo">
                    <div class="label">Descripción</div>
                    <div class="value">${art.descripcion || 'Sin descripción'}</div>
                </div>
                <div class="campo">
                    <div class="label">Ref. Sistema</div>
                    <div class="value">${art.descripcion_sistema || 'N/A'}</div>
                </div>
                <div class="campo">
                    <div class="label">Precio</div>
                    <div class="value precio">$${art.precio.toFixed(2)}</div>
                </div>
                <div class="campo">
                    <div class="label">Unidad de Venta</div>
                    <div class="value">${art.unidad_venta}</div>
                </div>
                <div class="campo">
                    <div class="label">Almacén</div>
                    <div class="value">${zona}</div>
                </div>
                ${art.pz_x_caja ? `
                <div class="campo">
                    <div class="label">Piezas por Caja</div>
                    <div class="value">${art.pz_x_caja}</div>
                </div>` : ''}
                <div class="campo">
                    <div class="label">Código de Barras</div>
                    <div class="value">${art.codigo_barras || 'N/A'}</div>
                </div>
                ${art.timestamp ? `
                <div class="campo">
                    <div class="label">Fecha Registro</div>
                    <div class="value">${art.timestamp}</div>
                </div>` : ''}
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modalDetalle').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ========== EVENTOS GLOBALES ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModal();
            if (!document.getElementById('modalDetalle').classList.contains('active')) {
                if (e.key === 'ArrowLeft') cambiarPagina(-1);
                if (e.key === 'ArrowRight') cambiarPagina(1);
            }
        });

        document.getElementById('modalDetalle').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) cerrarModal();
        });

        document.getElementById('prevPageHeader').addEventListener('click', () => cambiarPagina(-1));
        document.getElementById('nextPageHeader').addEventListener('click', () => cambiarPagina(1));
        document.getElementById('prevPage').addEventListener('click', () => cambiarPagina(-1));
        document.getElementById('nextPage').addEventListener('click', () => cambiarPagina(1));

        // ========== INICIAR ==========
        document.addEventListener('DOMContentLoaded', cargarCatalogo);
    </script>
</body>
</html>
