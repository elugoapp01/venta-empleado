<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Catálogo de Artículos · Sistema Corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #EFF2F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .catalog-container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(11, 47, 92, 0.08);
            padding: 30px;
            border: 1px solid rgba(201, 167, 77, 0.15);
        }

        .header-catalog {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #E9ECF0;
            padding-bottom: 18px;
        }

        .header-catalog .left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-catalog h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0B2F5C;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
        }

        .header-catalog h1 i {
            color: #C9A74D;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-controls .nav-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #0B2F5C;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-controls .nav-btn:hover:not(:disabled) {
            background: #16486C;
            transform: scale(1.08);
        }

        .header-controls .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .header-controls .nav-btn i {
            color: #C9A74D;
        }

        .header-controls .page-indicator {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.85rem;
            background: #F2F6FA;
            padding: 6px 16px;
            border-radius: 30px;
            min-width: 80px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #F2F6FA;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #0B2F5C;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item i {
            color: #C9A74D;
        }

        /* ========== ESTILO DEL LIBRO ========== */
        .book-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            perspective: 1500px;
            padding: 10px 0;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .book-page {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            padding: 25px;
            display: none;
            transform-origin: left center;
            transition: all 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border: 1px solid #E9ECF0;
        }

        .book-page.active {
            display: block;
            animation: pageFlipIn 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .book-page.flipping {
            animation: pageFlipOut 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        @keyframes pageFlipIn {
            0% {
                transform: rotateY(-90deg) scale(0.95);
                opacity: 0;
            }
            100% {
                transform: rotateY(0deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes pageFlipOut {
            0% {
                transform: rotateY(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: rotateY(90deg) scale(0.95);
                opacity: 0;
            }
        }

        /* Grid de artículos - 6 tarjetas por página */
        .articulos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .articulo-card {
            background: #F9FBFD;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #E2E7ED;
            cursor: pointer;
        }

        .articulo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(11, 47, 92, 0.1);
            border-color: #C9A74D;
        }

        .articulo-card .foto-container {
            width: 100%;
            height: 180px;
            background: #F2F6FA;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .articulo-card .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .articulo-card:hover .foto-container img {
            transform: scale(1.05);
        }

        .articulo-card .foto-container .no-image {
            font-size: 2.5rem;
            color: #6C8196;
            opacity: 0.5;
        }

        .articulo-card .info {
            padding: 12px 14px;
        }

        .articulo-card .info .id-badge {
            display: inline-block;
            background: #C9A74D;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .articulo-card .info .sku {
            font-size: 0.7rem;
            color: #6C8196;
            font-weight: 500;
        }

        .articulo-card .info .descripcion {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.8rem;
            margin: 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 38px;
        }

        .articulo-card .info .desc-sistema {
            font-size: 0.65rem;
            color: #6C8196;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ZONA */
        .articulo-card .info .zona-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .zona-a {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .zona-b {
            background: #FEF3C7;
            color: #92400E;
        }

        /* PRECIO - Limpio y profesional */
        .articulo-card .info .precio-container {
            background: white;
            border-radius: 10px;
            padding: 8px 10px;
            margin: 6px 0;
            border: 1.5px solid #E2E7ED;
        }

        .articulo-card .info .precio-inventario {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0B2F5C;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .articulo-card .info .precio-inventario span {
            color: #6C8196;
            font-weight: 500;
            font-size: 0.6rem;
        }

        .articulo-card .info .precios-venta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.75rem;
        }

        .articulo-card .info .precios-venta .precio-30 {
            background: #F2F6FA;
            padding: 4px 8px;
            border-radius: 16px;
            font-weight: 600;
            color: #0B2F5C;
            flex: 1;
            text-align: center;
            border: 1px solid #E2E7ED;
        }

        .articulo-card .info .precios-venta .precio-40 {
            background: #F2F6FA;
            padding: 4px 8px;
            border-radius: 16px;
            font-weight: 600;
            color: #0B2F5C;
            flex: 1;
            text-align: center;
            border: 1px solid #E2E7ED;
        }

        .articulo-card .info .precios-venta .label-precio {
            font-weight: 400;
            font-size: 0.5rem;
            color: #6C8196;
            display: block;
        }

        /* CANTIDAD */
        .articulo-card .info .cantidad-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #F2F6FA;
            padding: 6px 12px;
            border-radius: 10px;
            margin-top: 6px;
            border: 1px solid #E2E7ED;
        }

        .articulo-card .info .cantidad-container .cantidad-icon {
            color: #C9A74D;
            font-size: 0.85rem;
        }

        .articulo-card .info .cantidad-container .cantidad-valor {
            font-size: 1.1rem;
            font-weight: 800;
            color: #0B2F5C;
        }

        .articulo-card .info .cantidad-container .cantidad-unidad {
            font-size: 0.6rem;
            color: #6C8196;
            font-weight: 500;
        }

        .articulo-card .info .detalles {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
            font-size: 0.6rem;
            color: #4A627A;
        }

        .articulo-card .info .detalles span {
            background: white;
            padding: 2px 8px;
            border-radius: 16px;
            border: 1px solid #E2E7ED;
        }

        /* Controles de navegación */
        .book-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #E9ECF0;
        }

        .book-controls button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #0B2F5C;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-controls button:hover:not(:disabled) {
            background: #16486C;
            transform: scale(1.08);
        }

        .book-controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .book-controls button i {
            color: #C9A74D;
        }

        .book-controls .page-indicator-footer {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.9rem;
            background: #F2F6FA;
            padding: 8px 20px;
            border-radius: 30px;
            min-width: 100px;
            text-align: center;
        }

        /* ========== MODAL DETALLE ========== */
        .modal-detalle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-detalle.active {
            display: flex;
        }

        .modal-detalle-content {
            background: white;
            border-radius: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            padding: 30px;
            animation: modalFadeIn 0.4s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-detalle-content .modal-foto {
            width: 100%;
            max-height: 500px;
            border-radius: 16px;
            overflow: hidden;
            background: #F2F6FA;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .modal-detalle-content .modal-foto img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        .modal-detalle-content .modal-foto .no-image {
            font-size: 4rem;
            color: #6C8196;
            opacity: 0.5;
            padding: 60px;
        }

        .modal-detalle-content .modal-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-detalle-content .modal-info .campo {
            background: #F9FBFD;
            padding: 10px 14px;
            border-radius: 12px;
        }

        .modal-detalle-content .modal-info .campo .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #6C8196;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .modal-detalle-content .modal-info .campo .value {
            font-weight: 600;
            color: #0B2F5C;
            font-size: 0.9rem;
            margin-top: 2px;
        }

        .modal-detalle-content .modal-info .campo .value.precio {
            color: #1F6C4A;
            font-size: 1.2rem;
        }

        .modal-detalle-content .modal-info .campo .value.precio-venta {
            font-size: 1rem;
        }

        .modal-detalle-content .modal-info .campo .value.precio-venta .precio-30-modal {
            color: #0B2F5C;
            background: #F2F6FA;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 2px 0;
            border: 1px solid #E2E7ED;
            font-weight: 600;
        }

        .modal-detalle-content .modal-info .campo .value.precio-venta .precio-40-modal {
            color: #0B2F5C;
            background: #F2F6FA;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 2px 0;
            border: 1px solid #E2E7ED;
            font-weight: 600;
        }

        .modal-detalle-content .modal-close {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #0B2F5C;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .modal-detalle-content .modal-close:hover {
            background: #16486C;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6C8196;
        }

        .loading i {
            font-size: 3rem;
            color: #C9A74D;
            margin-bottom: 15px;
        }

        .loading .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Sin resultados */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6C8196;
        }

        .no-results i {
            font-size: 4rem;
            color: #C9A74D;
            opacity: 0.5;
            margin-bottom: 15px;
        }

        /* Scrollbar */
        .modal-detalle-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-detalle-content::-webkit-scrollbar-track {
            background: #F2F6FA;
            border-radius: 10px;
        }
        .modal-detalle-content::-webkit-scrollbar-thumb {
            background: #C9A74D;
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .articulos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 900px) {
            .header-catalog {
                flex-direction: column;
                align-items: stretch;
            }
            .header-catalog .left {
                flex-wrap: wrap;
                justify-content: space-between;
            }
            .stats {
                justify-content: center;
            }
            .header-controls {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .catalog-container { padding: 20px; }
            .header-catalog h1 { font-size: 1.3rem; }
            .articulos-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px;
            }
            .articulo-card .foto-container { height: 150px; }
            .modal-detalle-content .modal-info { grid-template-columns: 1fr; }
            .modal-detalle-content .modal-foto { max-height: 300px; }
            .modal-detalle-content .modal-foto img { max-height: 300px; }
            .header-controls .nav-btn { width: 36px; height: 36px; font-size: 0.9rem; }
            .articulo-card .info .cantidad-container .cantidad-valor { font-size: 1rem; }
            .articulo-card .info .precios-venta { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .articulos-grid { 
                grid-template-columns: 1fr 1fr; 
                gap: 10px;
            }
            .articulo-card .info { padding: 10px; }
            .articulo-card .info .descripcion { font-size: 0.7rem; min-height: 30px; }
            .articulo-card .info .precio-inventario { font-size: 0.8rem; }
            .articulo-card .info .precios-venta { font-size: 0.65rem; flex-direction: column; gap: 4px; }
            .articulo-card .info .precios-venta .precio-30,
            .articulo-card .info .precios-venta .precio-40 { padding: 3px 6px; }
            .articulo-card .foto-container { height: 120px; }
            .modal-detalle-content .modal-foto { max-height: 250px; }
            .modal-detalle-content .modal-foto img { max-height: 250px; }
            .header-catalog h1 { font-size: 0.9rem; }
            .stat-item { font-size: 0.65rem; padding: 4px 10px; }
            .header-controls .page-indicator { font-size: 0.65rem; padding: 4px 8px; min-width: 50px; }
            .articulo-card .info .cantidad-container .cantidad-valor { font-size: 0.9rem; }
            .articulo-card .info .cantidad-container { padding: 4px 10px; }
            .articulo-card .info .detalles { font-size: 0.55rem; }
            .articulo-card .info .detalles span { padding: 1px 6px; }
        }
    </style>
</head>
<body>

    <div class="catalog-container">
        <!-- HEADER -->
        <div class="header-catalog">
            <div class="left">
                <h1>
                    <i class="fas fa-book-open"></i> Catálogo
                </h1>
                <div class="header-controls">
                    <button class="nav-btn" id="prevPageHeader" title="Página anterior">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span class="page-indicator" id="pageIndicatorHeader">1 / 1</span>
                    <button class="nav-btn" id="nextPageHeader" title="Página siguiente">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <i class="fas fa-boxes"></i>
                    <span id="totalArticulos">0</span> artículos
                </div>
                <div class="stat-item">
                    <i class="fas fa-warehouse"></i>
                    <span id="totalAlmacenes">0</span> almacenes
                </div>
            </div>
        </div>

        <!-- CONTENEDOR DEL LIBRO -->
        <div id="bookContainer" class="book-container">
            <div class="loading" id="loading">
                <i class="fas fa-book-open spinner"></i>
                <p>Cargando catálogo...</p>
            </div>
            <div id="bookPages" class="book"></div>
        </div>

        <!-- CONTROLES DEL LIBRO (FOOTER) -->
        <div class="book-controls">
            <button id="prevPage" title="Página anterior">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="page-indicator-footer" id="pageIndicatorFooter">Página 1 / 1</span>
            <button id="nextPage" title="Página siguiente">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- MODAL DE DETALLE -->
    <div id="modalDetalle" class="modal-detalle">
        <div class="modal-detalle-content">
            <div class="modal-foto" id="modalFoto">
                <div class="no-image"><i class="fas fa-image"></i></div>
            </div>
            <div class="modal-info" id="modalInfo">
                <!-- Generado por JS -->
            </div>
            <button class="modal-close" onclick="cerrarModal()">
                <i class="fas fa-times"></i> Cerrar
            </button>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN DE FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyA0wUh8AqTOT36ofTMVHdKSRqWZ1MMhHzY",
            authDomain: "venta-empleado.firebaseapp.com",
            projectId: "venta-empleado",
            storageBucket: "venta-empleado.firebasestorage.app",
            messagingSenderId: "655370302032",
            appId: "1:655370302032:web:bc276acc7683a67b49d755"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // ==============================================

        let articulosCompletos = [];
        let preciosMap = {};
        let paginaActual = 0;
        const ARTICULOS_POR_PAGINA = 6;

        // ========== FUNCIÓN DE REDONDEO ==========
        function redondearArriba(precio) {
            return Math.ceil(precio / 10) * 10;
        }

        // ========== CARGAR DATOS ==========
        async function cargarCatalogo() {
            try {
                const loading = document.getElementById('loading');
                loading.style.display = 'block';

                const preciosSnap = await db.collection('precios').get();
                preciosMap = {};
                preciosSnap.forEach(doc => {
                    const data = doc.data();
                    preciosMap[doc.id] = {
                        precio: data.p_unitario || 0,
                        descripcion_sistema: data.descripcion_sistema || ''
                    };
                });

                const articulosSnap = await db.collection('articulos').get();
                articulosCompletos = [];
                articulosSnap.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const precioData = preciosMap[id] || {};
                    articulosCompletos.push({
                        id: id,
                        sku: data.sku || '',
                        descripcion: data.descripcion || '',
                        codigo_barras: data.codigo_barras || '',
                        fotografia: data.fotografia || '',
                        cantidad: data.cantidad || 0,
                        unidad_venta: data.unidad_venta || 'PIEZA',
                        almacen: data.almacen || '',
                        pz_x_caja: data.pz_x_caja || null,
                        precio: precioData.precio || 0,
                        descripcion_sistema: precioData.descripcion_sistema || '',
                        timestamp: data.timestamp || ''
                    });
                });

                articulosCompletos.sort((a, b) => a.id.localeCompare(b.id));

                document.getElementById('totalArticulos').textContent = articulosCompletos.length;
                const almacenes = new Set(articulosCompletos.map(a => a.almacen).filter(a => a));
                document.getElementById('totalAlmacenes').textContent = almacenes.size;

                loading.style.display = 'none';
                renderizarPagina(0);

            } catch (error) {
                console.error('Error al cargar:', error);
                document.getElementById('loading').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color:#C44536;"></i>
                    <p>Error al cargar el catálogo: ${error.message}</p>
                `;
            }
        }

        // ========== RENDERIZAR PÁGINA ==========
        function renderizarPagina(numeroPagina) {
            const container = document.getElementById('bookPages');
            const totalPaginas = Math.ceil(articulosCompletos.length / ARTICULOS_POR_PAGINA);

            if (totalPaginas === 0) {
                container.innerHTML = `
                    <div class="book-page active">
                        <div class="no-results">
                            <i class="fas fa-box-open"></i>
                            <h3>No hay artículos registrados</h3>
                            <p style="color:#6C8196;">Comienza registrando productos en el sistema.</p>
                        </div>
                    </div>
                `;
                actualizarControles(totalPaginas);
                return;
            }

            paginaActual = Math.max(0, Math.min(numeroPagina, totalPaginas - 1));

            const inicio = paginaActual * ARTICULOS_POR_PAGINA;
            const fin = Math.min(inicio + ARTICULOS_POR_PAGINA, articulosCompletos.length);
            const articulosPagina = articulosCompletos.slice(inicio, fin);

            let html = `<div class="book-page active">`;
            html += `<div class="articulos-grid">`;

            for (const art of articulosPagina) {
                const fotoHtml = art.fotografia ?
                    `<img src="${art.fotografia}" alt="${art.descripcion}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'><i class=\\'fas fa-image\\'></i></div>'">` :
                    `<div class="no-image"><i class="fas fa-image"></i></div>`;

                const zonaClase = art.almacen === 'INVENTARIOS' ? 'zona-a' : art.almacen === 'LOGISTICA INVERSA' ? 'zona-b' : '';
                const zonaTexto = art.almacen === 'INVENTARIOS' ? 'Zona A (INVENTARIOS)' :
                    art.almacen === 'LOGISTICA INVERSA' ? 'Zona B (LOGISTICA INVERSA)' :
                    art.almacen || 'N/A';

                const precioInventario = art.precio;
                // Aplicar redondeo a los precios de venta
                const precio30 = redondearArriba(precioInventario * 0.70);
                const precio40 = redondearArriba(precioInventario * 0.60);

                html += `
                    <div class="articulo-card" onclick="abrirDetalle('${art.id}')">
                        <div class="foto-container">${fotoHtml}</div>
                        <div class="info">
                            <div>
                                <span class="id-badge">${art.id}</span>
                                <span class="sku">SKU: ${art.sku || 'N/A'}</span>
                            </div>
                            <div class="descripcion">${art.descripcion || 'Sin descripción'}</div>
                            ${art.descripcion_sistema ? `<div class="desc-sistema">📌 ${art.descripcion_sistema}</div>` : ''}
                            
                            <span class="zona-badge ${zonaClase}">📍 ${zonaTexto}</span>
                            
                            <div class="precio-container">
                                <div class="precio-inventario">
                                    <span>💰 Precio Inventario</span>
                                    <span>$${precioInventario.toFixed(2)}</span>
                                </div>
                                <div class="precios-venta">
                                    <div class="precio-30">
                                        <span class="label-precio">-30%</span>
                                        $${precio30.toFixed(2)}
                                    </div>
                                    <div class="precio-40">
                                        <span class="label-precio">-40%</span>
                                        $${precio40.toFixed(2)}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="cantidad-container">
                                <span class="cantidad-icon"><i class="fas fa-cubes"></i></span>
                                <span class="cantidad-valor">${art.cantidad}</span>
                                <span class="cantidad-unidad">${art.unidad_venta}</span>
                            </div>
                            
                            <div class="detalles">
                                ${art.pz_x_caja ? `<span><i class="fas fa-boxes"></i> ${art.pz_x_caja} pz/caja</span>` : ''}
                                <span><i class="fas fa-barcode"></i> ${art.codigo_barras || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            const espaciosVacios = ARTICULOS_POR_PAGINA - articulosPagina.length;
            for (let i = 0; i < espaciosVacios; i++) {
                html += `<div style="visibility:hidden;"></div>`;
            }

            html += `</div></div>`;
            container.innerHTML = html;

            actualizarControles(totalPaginas);
        }

        // ========== ACTUALIZAR CONTROLES ==========
        function actualizarControles(totalPaginas) {
            const disabledPrev = paginaActual === 0;
            const disabledNext = paginaActual >= totalPaginas - 1 || totalPaginas === 0;
            const pageText = totalPaginas === 0 ? '0 / 0' : `${paginaActual + 1} / ${totalPaginas}`;

            document.getElementById('prevPageHeader').disabled = disabledPrev;
            document.getElementById('nextPageHeader').disabled = disabledNext;
            document.getElementById('pageIndicatorHeader').textContent = pageText;

            document.getElementById('prevPage').disabled = disabledPrev;
            document.getElementById('nextPage').disabled = disabledNext;
            document.getElementById('pageIndicatorFooter').textContent = `Página ${pageText}`;
        }

        // ========== CAMBIAR PÁGINA ==========
        function cambiarPagina(direccion) {
            const totalPaginas = Math.ceil(articulosCompletos.length / ARTICULOS_POR_PAGINA);
            const nuevaPagina = paginaActual + direccion;
            if (nuevaPagina < 0 || nuevaPagina >= totalPaginas) return;

            const currentPage = document.querySelector('.book-page.active');
            if (currentPage) {
                currentPage.classList.remove('active');
                currentPage.classList.add('flipping');
                setTimeout(() => {
                    renderizarPagina(nuevaPagina);
                }, 300);
            } else {
                renderizarPagina(nuevaPagina);
            }
        }

        // ========== ABRIR MODAL DE DETALLE ==========
        function abrirDetalle(id) {
            const art = articulosCompletos.find(a => a.id === id);
            if (!art) return;

            const modal = document.getElementById('modalDetalle');
            const fotoContainer = document.getElementById('modalFoto');
            const infoContainer = document.getElementById('modalInfo');

            if (art.fotografia) {
                fotoContainer.innerHTML = `<img src="${art.fotografia}" alt="${art.descripcion}" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'><i class=\\'fas fa-image\\'></i></div>'">`;
            } else {
                fotoContainer.innerHTML = `<div class="no-image"><i class="fas fa-image"></i></div>`;
            }

            const zona = art.almacen === 'INVENTARIOS' ? 'Zona A (INVENTARIOS)' :
                art.almacen === 'LOGISTICA INVERSA' ? 'Zona B (LOGISTICA INVERSA)' :
                art.almacen || 'No asignado';

            const precioInventario = art.precio;
            const precio30 = redondearArriba(precioInventario * 0.70);
            const precio40 = redondearArriba(precioInventario * 0.60);

            infoContainer.innerHTML = `
                <div class="campo">
                    <div class="label">ID Único</div>
                    <div class="value">${art.id}</div>
                </div>
                <div class="campo">
                    <div class="label">SKU</div>
                    <div class="value">${art.sku || 'N/A'}</div>
                </div>
                <div class="campo">
                    <div class="label">Descripción</div>
                    <div class="value">${art.descripcion || 'Sin descripción'}</div>
                </div>
                <div class="campo">
                    <div class="label">Ref. Sistema</div>
                    <div class="value">${art.descripcion_sistema || 'N/A'}</div>
                </div>
                <div class="campo">
                    <div class="label">Precio Inventario</div>
                    <div class="value precio">$${precioInventario.toFixed(2)}</div>
                </div>
                <div class="campo">
                    <div class="label">Precios de Venta</div>
                    <div class="value precio-venta">
                        <div class="precio-30-modal">-30%: $${precio30.toFixed(2)}</div>
                        <div class="precio-40-modal">-40%: $${precio40.toFixed(2)}</div>
                    </div>
                </div>
                <div class="campo">
                    <div class="label">Cantidad en Stock</div>
                    <div class="value" style="font-size:1.2rem; font-weight:800; color:#0B2F5C;">${art.cantidad} ${art.unidad_venta}</div>
                </div>
                <div class="campo">
                    <div class="label">Unidad de Venta</div>
                    <div class="value">${art.unidad_venta}</div>
                </div>
                <div class="campo">
                    <div class="label">Almacén</div>
                    <div class="value">${zona}</div>
                </div>
                ${art.pz_x_caja ? `
                <div class="campo">
                    <div class="label">Piezas por Caja</div>
                    <div class="value">${art.pz_x_caja}</div>
                </div>` : ''}
                <div class="campo">
                    <div class="label">Código de Barras</div>
                    <div class="value">${art.codigo_barras || 'N/A'}</div>
                </div>
                ${art.timestamp ? `
                <div class="campo">
                    <div class="label">Fecha Registro</div>
                    <div class="value">${art.timestamp}</div>
                </div>` : ''}
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modalDetalle').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModal();
            if (!document.getElementById('modalDetalle').classList.contains('active')) {
                if (e.key === 'ArrowLeft') cambiarPagina(-1);
                if (e.key === 'ArrowRight') cambiarPagina(1);
            }
        });

        document.getElementById('modalDetalle').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) cerrarModal();
        });

        document.getElementById('prevPageHeader').addEventListener('click', () => cambiarPagina(-1));
        document.getElementById('nextPageHeader').addEventListener('click', () => cambiarPagina(1));
        document.getElementById('prevPage').addEventListener('click', () => cambiarPagina(-1));
        document.getElementById('nextPage').addEventListener('click', () => cambiarPagina(1));

        document.addEventListener('DOMContentLoaded', cargarCatalogo);
    </script>
</body>
</html>
